<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bokstavspusslet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a1a; color: #e8e8e8; display: flex; justify-content: center; padding: 3rem 1rem; }
    .card { background: #242424; border-radius: 12px; padding: 2rem; max-width: 540px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.5rem; color: #f0f0f0; }
    textarea { width: 100%; height: 100px; font-size: 15px; padding: 10px 12px; border-radius: 8px; border: 1px solid #3a3a3a; background: #2e2e2e; color: #e8e8e8; font-family: sans-serif; line-height: 1.6; resize: vertical; margin-bottom: 0.75rem; }
    textarea:focus { outline: none; border-color: #4a90e2; box-shadow: 0 0 0 3px rgba(74,144,226,0.2); }
    textarea::placeholder { color: #666; }
    button { padding: 9px 22px; border-radius: 8px; border: 1px solid #444; background: #2e2e2e; color: #e8e8e8; font-size: 14px; cursor: pointer; transition: background 0.15s; }
    button:hover { background: #383838; }
    button:active { transform: scale(0.98); }
    .result { margin-top: 1.25rem; padding: 1rem 1.25rem; border-radius: 10px; font-size: 14px; line-height: 1.6; display: none; }
    .result.success { background: #1a3a2a; border: 1px solid #3a7a50; color: #6fcf97; }
    .result.error { background: #3a1a1a; border: 1px solid #7a3a3a; color: #f08080; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Du måste bli godkänd</h1>

    <textarea id="input" placeholder="Skriv din mening här..."></textarea>
    <button onclick="checkAnswer()">✔ Kontrollera</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    function countWords(str) {
      return str.trim() === '' ? 0 : str.trim().split(/\s+/).length;
    }
    function hasLetter(str, letter) {
      return str.toLowerCase().includes(letter);
    }
    function checkAnswer() {
      const val = document.getElementById('input').value.trim();
      const wc = countWords(val);
      const lower = val.toLowerCase();
      const result = document.getElementById('result');
      result.style.display = 'block';

      const missingLetters = ['x','y','z'].filter(l => !hasLetter(lower, l)).map(l => l.toUpperCase());
      let wordMsg = '';
      if (wc > 20) wordMsg = 'För mycket prat!';
      else if (wc < 15) wordMsg = 'För kort!';

      if (missingLetters.length === 0 && wordMsg === '') {
        result.className = 'result success';
        result.textContent = '🎉 Pusslet löst! Din mening uppfyller alla krav.';
      } else {
        result.className = 'result error';
        let msg = '';
        if (wordMsg) msg += wordMsg;
        if (missingLetters.length > 0) {
          if (msg) msg += ' För lite xyz.';
          else msg = 'För lite xyz.';
        }
        result.textContent = msg;
      }
    }
  </script>
</body>
</html>
